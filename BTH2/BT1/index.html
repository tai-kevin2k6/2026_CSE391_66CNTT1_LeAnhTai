<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="sytle.css">
    <title>Document</title>
</head>
<body>
    <div class="contact-form">
        <div class="form-header">
            <h3>Get in touch with us by filling contact form below</h3>
        </div>
        <div class="row">
            <input type="text" placeholder="*Enter your full name" class="row-half">
            <input type="text" placeholder="*Enter your email address" class="row-half">
        </div>
        <div class="row">
            <input type="text" placeholder="Enter your subject" class="row-full">
        </div>
        <div class="row">
            <textarea placeholder="*Your message here..." rows="8" class="row-full" ></textarea>
        </div>
        <div class="form-footer">
            <button class="btn-submit">Send message</button>
            <h3 class="footer-notice">*Please fill all required form field, thanks!</h3>
        </div>
    </div>
</body>
</html>
