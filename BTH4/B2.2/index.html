<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đặt hàng</title>
  <style>
    .error { color: red; font-size: 0.9em; }
    form div, fieldset { margin-bottom: 8px; }
    label { display: inline-block; width: 120px; }
  </style>
</head>
<body>
  <h1>Đặt hàng trực tuyến</h1>
  <form id="orderForm" novalidate>
    <div>
      <label for="product">Tên sản phẩm:</label>
      <select id="product" name="product">
        <option value="">-- Chọn sản phẩm --</option>
        <option value="Ao">Áo</option>
        <option value="Quan">Quần</option>
        <option value="Giay">Giày</option>
      </select>
      <span class="error" id="productError"></span>
    </div>
    <div>
      <label for="quantity">Số lượng:</label>
      <input type="number" id="quantity" name="quantity" min="1" max="99" />
      <span class="error" id="quantityError"></span>
    </div>
    <div>
      <label for="date">Ngày giao hàng:</label>
      <input type="date" id="date" name="date" />
      <span class="error" id="dateError"></span>
    </div>
    <div>
      <label for="address">Địa chỉ giao:</label>
      <textarea id="address" name="address" rows="2"></textarea>
      <span class="error" id="addressError"></span>
    </div>
    <div>
      <label for="note">Ghi chú:</label>
      <textarea id="note" name="note" rows="3" maxlength="200"></textarea>
      <div><small id="noteCount">0/200</small></div>
      <span class="error" id="noteError"></span>
    </div>
    <fieldset>
      <legend>Phương thức thanh toán:</legend>
      <label><input type="radio" name="payment" value="COD"> COD</label>
      <label><input type="radio" name="payment" value="ChuyenKhoan"> Chuyển khoản</label>
      <label><input type="radio" name="payment" value="ViDienTu"> Ví điện tử</label>
      <span class="error" id="paymentError"></span>
    </fieldset>
    <div>
      <label>Tổng tiền: <span id="total">0</span> VND</label>
    </div>
    <button type="submit">Đặt hàng</button>
  </form>

  <div id="confirm" style="display:none; border:1px solid #000; padding:10px; margin-top:10px;">
    <h3>Xác nhận đặt hàng</h3>
    <div id="summary"></div>
    <button id="confirmBtn">Xác nhận</button>
    <button id="cancelBtn">Hủy</button>
  </div>

  <div id="success" style="display:none; color:green; margin-top:10px;">
    Đơn hàng đã được gửi thành công!
  </div>

  <script src="script.js"></script>
</body>
</html>
